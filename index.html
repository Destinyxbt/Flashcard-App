<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet"/>
  <!-- Supabase JS library — gives us auth + database in one package -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f7f7f5; --surface:#ffffff; --border:#e4e4e0; --ink:#1a1a18;
      --muted:#888884; --accent:#2563eb; --accent-bg:#eff4ff; --danger:#dc2626;
      --radius:12px; --shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);
    }
    body { background:var(--bg); font-family:'Inter',sans-serif; color:var(--ink); min-height:100vh; }

    /* AUTH SCREEN */
    .auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:min(400px,100%); box-shadow:var(--shadow); }
    .auth-logo { font-family:'Lora',serif; font-size:22px; font-weight:500; margin-bottom:6px; }
    .auth-tagline { font-size:13px; color:var(--muted); margin-bottom:32px; }
    .auth-tabs { display:flex; margin-bottom:28px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .auth-tab { flex:1; padding:9px; background:none; border:none; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; transition:background 0.15s,color 0.15s; }
    .auth-tab.active { background:var(--ink); color:#fff; }
    .auth-field { margin-bottom:16px; }
    .auth-field label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; }
    .auth-field input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); background:var(--bg); outline:none; transition:border-color 0.15s; }
    .auth-field input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; transition:opacity 0.15s; }
    .auth-btn:hover { opacity:0.88; }
    .auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .auth-msg { margin-top:14px; font-size:13px; text-align:center; min-height:18px; }
    .auth-msg.error { color:var(--danger); }
    .auth-msg.success { color:#16a34a; }

    /* MAIN APP */
    .app { display:none; }
    .app.visible { display:flex; height:100vh; overflow:hidden; }
    .sidebar { width:260px; min-width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid var(--border); }
    .user-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .user-name { font-size:13px; font-weight:500; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
    .btn-logout { font-size:11px; color:var(--muted); background:none; border:1px solid var(--border); border-radius:6px; padding:4px 8px; cursor:pointer; transition:color 0.15s,border-color 0.15s; white-space:nowrap; }
    .btn-logout:hover { color:var(--danger); border-color:var(--danger); }
    .app-name { font-family:'Lora',serif; font-size:17px; font-weight:500; margin-bottom:12px; }
    .new-topic-row { display:flex; gap:8px; }
    .new-topic-row input { flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; color:var(--ink); background:var(--bg); outline:none; transition:border-color 0.15s; }
    .new-topic-row input:focus { border-color:var(--accent); }
    .new-topic-row input::placeholder { color:var(--muted); }
    .btn-icon { width:34px; height:34px; border:none; border-radius:8px; background:var(--accent); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity 0.15s; flex-shrink:0; }
    .btn-icon:hover { opacity:0.85; }
    .topic-list { flex:1; overflow-y:auto; padding:10px; }
    .topic-item { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink); transition:background 0.1s; gap:8px; }
    .topic-item:hover { background:var(--bg); }
    .topic-item.active { background:var(--accent-bg); color:var(--accent); font-weight:500; }
    .topic-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .topic-count { font-size:11px; color:var(--muted); background:var(--border); border-radius:20px; padding:1px 7px; flex-shrink:0; }
    .topic-item.active .topic-count { background:#d1e0ff; color:var(--accent); }
    .topic-delete { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; opacity:0; padding:0 2px; border-radius:4px; transition:opacity 0.15s,color 0.15s; flex-shrink:0; }
    .topic-item:hover .topic-delete { opacity:1; }
    .topic-delete:hover { color:var(--danger); }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { padding:20px 32px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface); }
    .topic-title { font-family:'Lora',serif; font-size:22px; font-weight:500; letter-spacing:-0.02em; }
    .topic-subtitle { font-size:12px; color:var(--muted); margin-top:2px; }
    .btn-study { padding:8px 18px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:opacity 0.15s; }
    .btn-study:hover { opacity:0.85; }
    .btn-study:disabled { opacity:0.35; cursor:not-allowed; }
    .cards-area { flex:1; overflow-y:auto; padding:28px 32px; }
    .loading { display:flex; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--muted); font-size:14px; }
    .empty-state, .no-topic { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--muted); text-align:center; }
    .empty-icon, .no-topic-icon { font-size:40px; opacity:0.4; }
    .empty-state h3 { font-size:15px; font-weight:500; color:var(--ink); }
    .empty-state p, .no-topic p { font-size:13px; max-width:240px; line-height:1.6; }
    .add-card-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:24px; box-shadow:var(--shadow); }
    .add-card-form h4 { font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
    .form-labels { display:flex; gap:12px; margin-bottom:4px; }
    .form-labels span { flex:1; font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.07em; }
    .form-row { display:flex; gap:12px; margin-bottom:12px; }
    .form-row textarea { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; color:var(--ink); background:var(--bg); resize:vertical; min-height:72px; outline:none; transition:border-color 0.15s; line-height:1.5; }
    .form-row textarea:focus { border-color:var(--accent); }
    .form-row textarea::placeholder { color:var(--muted); }
    .btn-add-card { padding:9px 20px; background:var(--ink); color:#fff; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:opacity 0.15s; }
    .btn-add-card:hover { opacity:0.8; }
    .btn-add-card:disabled { opacity:0.5; cursor:not-allowed; }

    /* Trigger button — sits in the card area, opens the drawer */
    .btn-open-drawer {
      display:flex; align-items:center; gap:8px;
      padding:10px 18px; background:var(--surface);
      border:1px dashed var(--border); border-radius:10px;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
      color:var(--muted); cursor:pointer; margin-bottom:24px;
      transition:border-color 0.15s, color 0.15s;
    }
    .btn-open-drawer:hover { border-color:var(--accent); color:var(--accent); }
    .btn-open-drawer span { font-size:18px; line-height:1; }

    /* Drawer overlay — dark background behind the drawer */
    .drawer-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.25); z-index:200;
      backdrop-filter:blur(2px);
    }
    .drawer-overlay.open { display:block; }

    /* Drawer panel — slides in from the right */
    .drawer {
      position:fixed; top:0; right:0; bottom:0;
      width:min(480px, 100vw);
      background:var(--surface);
      border-left:1px solid var(--border);
      box-shadow:-8px 0 40px rgba(0,0,0,0.1);
      z-index:201;
      display:flex; flex-direction:column;
      /* Start off-screen to the right */
      transform:translateX(100%);
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    /* Slide in when open class added */
    .drawer.open { transform:translateX(0); }

    .drawer-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px; border-bottom:1px solid var(--border);
    }
    .drawer-title { font-family:'Lora',serif; font-size:18px; font-weight:500; }
    .btn-close-drawer {
      width:32px; height:32px; border:none; background:var(--bg);
      border-radius:8px; font-size:18px; color:var(--muted);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.15s, color 0.15s;
    }
    .btn-close-drawer:hover { background:var(--border); color:var(--ink); }

    .drawer-body { flex:1; padding:24px; display:flex; flex-direction:column; gap:20px; overflow-y:auto; }

    .drawer-field label {
      display:block; font-size:11px; font-weight:600;
      letter-spacing:0.08em; text-transform:uppercase;
      color:var(--muted); margin-bottom:8px;
    }
    .drawer-field textarea {
      width:100%; padding:12px 14px;
      border:1px solid var(--border); border-radius:10px;
      font-family:'Inter',sans-serif; font-size:14px; color:var(--ink);
      background:var(--bg); resize:vertical; min-height:100px;
      outline:none; transition:border-color 0.15s; line-height:1.6;
    }
    .drawer-field textarea:focus { border-color:var(--accent); }
    .drawer-field textarea::placeholder { color:var(--muted); }

    .drawer-footer {
      padding:16px 24px; border-top:1px solid var(--border);
      display:flex; gap:10px;
    }
    .btn-drawer-save {
      flex:1; padding:12px; background:var(--accent); color:#fff;
      border:none; border-radius:10px;
      font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
      cursor:pointer; transition:opacity 0.15s;
    }
    .btn-drawer-save:hover { opacity:0.88; }
    .btn-drawer-save:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-drawer-cancel {
      padding:12px 20px; background:none;
      border:1px solid var(--border); border-radius:10px;
      font-family:'Inter',sans-serif; font-size:14px; font-weight:500;
      color:var(--muted); cursor:pointer; transition:background 0.15s;
    }
    .btn-drawer-cancel:hover { background:var(--bg); }
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .card-wrap { perspective:1000px; height:160px; cursor:pointer; }
    .card-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); }
    .card-wrap.flipped .card-inner { transform:rotateY(180deg); }
    .card-face { position:absolute; inset:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; padding:18px; overflow:hidden; }
    .card-back { transform:rotateY(180deg); background:var(--accent-bg); border-color:#c7d9ff; }
    .card-label { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .card-back .card-label { color:var(--accent); }
    .card-text { font-size:14px; line-height:1.55; color:var(--ink); flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; line-clamp:4; -webkit-box-orient:vertical; }
    .card-footer { display:flex; justify-content:flex-end; margin-top:10px; }
    .btn-delete-card { background:none; border:none; font-size:12px; color:var(--muted); cursor:pointer; padding:2px 4px; border-radius:4px; transition:color 0.15s,background 0.15s; }
    .btn-delete-card:hover { color:var(--danger); background:#fef2f2; }
    .card-hint { font-size:10px; color:var(--muted); opacity:0.6; margin-top:auto; }
    .study-overlay { display:none; position:fixed; inset:0; background:rgba(247,247,245,0.96); backdrop-filter:blur(6px); z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:28px; padding:40px; }
    .study-overlay.open { display:flex; }
    .study-progress { font-size:12px; color:var(--muted); letter-spacing:0.05em; }
    .study-card-wrap { perspective:1200px; width:min(500px,90vw); height:300px; cursor:pointer; }
    .study-card-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); }
    .study-card-wrap.flipped .study-card-inner { transform:rotateY(180deg); }
    .study-face { position:absolute; inset:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,0.1); backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; }
    .study-back-face { transform:rotateY(180deg); background:var(--accent-bg); border-color:#c7d9ff; }
    .study-label { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
    .study-back-face .study-label { color:var(--accent); }
    .study-text { font-family:'Lora',serif; font-size:20px; line-height:1.5; color:var(--ink); }
    .study-hint { font-size:12px; color:var(--muted); margin-top:20px; }
    .study-nav { display:flex; gap:12px; align-items:center; }
    .btn-nav { padding:10px 24px; border:1px solid var(--border); background:var(--surface); border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; color:var(--ink); cursor:pointer; transition:background 0.15s; }
    .btn-nav:hover { background:var(--bg); }
    .btn-nav:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-close-study { padding:10px 24px; background:var(--ink); color:#fff; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:opacity 0.15s; }
    .btn-close-study:hover { opacity:0.8; }
    @media(max-width:600px){.topbar,.cards-area{padding-left:16px;padding-right:16px;}}

    /* ── Mobile: sidebar becomes a slide-in drawer ── */
    @media(max-width:700px){
      /* Hide the desktop sidebar */
      .sidebar { display:none; }

      /* Show a mobile top nav bar instead */
      .mobile-nav {
        display:flex; align-items:center; justify-content:space-between;
        padding:12px 16px; background:var(--surface);
        border-bottom:1px solid var(--border);
        position:sticky; top:0; z-index:10;
      }
      .mobile-nav-left { display:flex; align-items:center; gap:10px; }
      .mobile-logo { font-family:'Lora',serif; font-size:16px; font-weight:500; }
      .mobile-topic-label {
        font-size:13px; color:var(--muted);
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        max-width:140px;
      }
      .btn-hamburger {
        width:36px; height:36px; border:none; background:var(--bg);
        border-radius:8px; cursor:pointer; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:5px;
        transition:background 0.15s;
      }
      .btn-hamburger:hover { background:var(--border); }
      .btn-hamburger span {
        display:block; width:18px; height:2px;
        background:var(--ink); border-radius:2px;
        transition:transform 0.2s, opacity 0.2s;
      }

      /* Mobile sidebar overlay */
      .mobile-sidebar-overlay {
        display:none; position:fixed; inset:0;
        background:rgba(0,0,0,0.3); z-index:300;
        backdrop-filter:blur(2px);
      }
      .mobile-sidebar-overlay.open { display:block; }

      /* Mobile sidebar panel slides in from left */
      .mobile-sidebar {
        position:fixed; top:0; left:0; bottom:0;
        width:min(300px, 85vw);
        background:var(--surface);
        border-right:1px solid var(--border);
        box-shadow:8px 0 40px rgba(0,0,0,0.12);
        z-index:301;
        display:flex; flex-direction:column;
        transform:translateX(-100%);
        transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      }
      .mobile-sidebar.open { transform:translateX(0); }

      .mobile-sidebar-header {
        padding:20px 16px 14px;
        border-bottom:1px solid var(--border);
        display:flex; flex-direction:column; gap:14px;
      }
      .mobile-sidebar-top {
        display:flex; align-items:center; justify-content:space-between;
      }
      .mobile-sidebar-title { font-family:'Lora',serif; font-size:17px; font-weight:500; }
      .btn-close-sidebar {
        width:30px; height:30px; border:none; background:var(--bg);
        border-radius:8px; font-size:16px; color:var(--muted); cursor:pointer;
        display:flex; align-items:center; justify-content:center;
      }
      .mobile-user-row {
        display:flex; align-items:center; justify-content:space-between;
      }
      .mobile-user-name { font-size:13px; font-weight:500; color:var(--ink); }

      /* Make the main area full width on mobile */
      .main { width:100%; }
    }

    /* Hide mobile nav on desktop */
    @media(min-width:701px){ .mobile-nav,.mobile-sidebar-overlay,.mobile-sidebar{ display:none!important; } }
  </style>
</head>
<body>

<!-- AUTH SCREEN — visible when logged out -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">Flashcards</div>
    <div class="auth-tagline">Your personal study companion</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Log in</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="authUsername" placeholder="Enter your username" autocomplete="username"/>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Enter your password" autocomplete="current-password"/>
    </div>
    <!-- Only shown on signup tab -->
    <div class="auth-field" id="confirmField" style="display:none">
      <label>Confirm Password</label>
      <input type="password" id="authConfirm" placeholder="Repeat your password" autocomplete="new-password"/>
    </div>
    <button class="auth-btn" id="authBtn" onclick="handleAuth()">Log in</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- MOBILE TOP NAV — only visible on small screens -->
<nav class="mobile-nav" id="mobileNav" style="display:none">
  <div class="mobile-nav-left">
    <button class="btn-hamburger" onclick="openMobileSidebar()">
      <span></span><span></span><span></span>
    </button>
    <div>
      <div class="mobile-logo">Flashcards</div>
      <div class="mobile-topic-label" id="mobileTopicLabel">No topic selected</div>
    </div>
  </div>
</nav>

<!-- MOBILE SIDEBAR OVERLAY + PANEL -->
<div class="mobile-sidebar-overlay" id="mobileSidebarOverlay" onclick="closeMobileSidebar()"></div>
<div class="mobile-sidebar" id="mobileSidebar">
  <div class="mobile-sidebar-header">
    <div class="mobile-sidebar-top">
      <div class="mobile-sidebar-title">Flashcards</div>
      <button class="btn-close-sidebar" onclick="closeMobileSidebar()">✕</button>
    </div>
    <div class="mobile-user-row">
      <span class="mobile-user-name" id="mobileUserDisplay"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
    <div class="new-topic-row">
      <input type="text" id="newTopicInputMobile" placeholder="New topic..." maxlength="40"/>
      <button class="btn-icon" onclick="addTopicMobile()">+</button>
    </div>
  </div>
  <div class="topic-list" id="topicListMobile"></div>
</div>

<!-- MAIN APP — visible when logged in -->
<div class="app" id="appScreen">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="user-row">
        <span class="user-name" id="userDisplay"></span>
        <button class="btn-logout" onclick="logout()">Log out</button>
      </div>
      <div class="app-name">Flashcards</div>
      <div class="new-topic-row">
        <input type="text" id="newTopicInput" placeholder="New topic..." maxlength="40"/>
        <button class="btn-icon" onclick="addTopic()">+</button>
      </div>
    </div>
    <div class="topic-list" id="topicList"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="topic-title" id="topicTitle">Select a topic</div>
        <div class="topic-subtitle" id="topicSubtitle">Pick a topic from the sidebar</div>
      </div>
      <button class="btn-study" id="studyBtn" onclick="openStudy()" disabled>Study</button>
    </div>
    <div class="cards-area" id="cardsArea">
      <div class="no-topic">
        <div class="no-topic-icon">📂</div>
        <p>Create a topic on the left to start adding flashcards</p>
      </div>
    </div>
  </main>
</div>

<!-- ADD CARD DRAWER — slides in from the right -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="addCardDrawer">
  <div class="drawer-header">
    <div class="drawer-title">Add a card</div>
    <button class="btn-close-drawer" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-field">
      <label>Front — Question or term</label>
      <textarea id="frontInput" placeholder="e.g. What is photosynthesis?" rows="4"></textarea>
    </div>
    <div class="drawer-field">
      <label>Back — Answer or definition</label>
      <textarea id="backInput" placeholder="e.g. The process by which plants convert sunlight into energy..." rows="4"></textarea>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn-drawer-cancel" onclick="closeDrawer()">Cancel</button>
    <button class="btn-drawer-save" id="addCardBtn" onclick="addCard()">Save card</button>
  </div>
</div>

<!-- STUDY MODE OVERLAY -->
<div class="study-overlay" id="studyOverlay">
  <div class="study-progress" id="studyProgress">Card 1 of 5</div>
  <div class="study-card-wrap" id="studyCardWrap" onclick="flipStudyCard()">
    <div class="study-card-inner">
      <div class="study-face">
        <div class="study-label">Question</div>
        <div class="study-text" id="studyFrontText"></div>
        <div class="study-hint">Click to reveal answer</div>
      </div>
      <div class="study-face study-back-face">
        <div class="study-label">Answer</div>
        <div class="study-text" id="studyBackText"></div>
        <div class="study-hint">Click to flip back</div>
      </div>
    </div>
  </div>
  <div class="study-nav">
    <button class="btn-nav" id="prevBtn" onclick="prevCard()">← Prev</button>
    <button class="btn-nav" id="nextBtn" onclick="nextCard()">Next →</button>
    <button class="btn-close-study" onclick="closeStudy()">Done</button>
  </div>
</div>

<script>
  // Connect to Supabase using our project URL and anon key
  const { createClient } = supabase;
  const db = createClient(
    'https://lkinlodutomimidzexhf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxraW5sb2R1dG9taW1pZHpleGhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDk3MDQsImV4cCI6MjA5Njc4NTcwNH0.llXm-mYEwXEGP20BY9sQOBwygUmH9tjGT6S960bCaCk'
  );

  // App state
  let currentUser = null;   // logged-in user object
  let topics      = [];     // topics from Supabase
  let activeTopic = null;   // selected topic id
  let activeCards = [];     // cards for selected topic
  let studyIndex  = 0;      // current card in study mode
  let currentTab  = 'login';

  // ── Auth ─────────────────────────────────────────

  function switchTab(tab) {
    currentTab = tab;
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    // Show confirm password field only on signup
    document.getElementById('confirmField').style.display = isLogin ? 'none' : 'block';
    document.getElementById('authBtn').textContent = isLogin ? 'Log in' : 'Create account';
    document.getElementById('authMsg').textContent = '';
  }

  async function handleAuth() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const confirm  = document.getElementById('authConfirm').value;
    const btn = document.getElementById('authBtn');

    if (!username || !password) return showAuthMsg('Please fill in all fields', 'error');
    if (currentTab === 'signup' && password !== confirm) return showAuthMsg('Passwords do not match', 'error');
    if (currentTab === 'signup' && password.length < 6) return showAuthMsg('Password must be at least 6 characters', 'error');

    btn.disabled = true;
    btn.textContent = currentTab === 'login' ? 'Logging in...' : 'Creating account...';

    // Supabase auth requires an email — we build a fake one from the username
    // The user never sees this email, they only ever type their username
    const fakeEmail = username.toLowerCase() + '@flashcard.app';

    if (currentTab === 'signup') {
      const { error } = await db.auth.signUp({ email: fakeEmail, password });
      if (error) {
        showAuthMsg(error.message.includes('already registered') ? 'Username already taken' : error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }
      showAuthMsg('Account created! Logging you in...', 'success');
    }

    // Sign in — works for both new signup and returning login
    const { data, error } = await db.auth.signInWithPassword({ email: fakeEmail, password });
    if (error) {
      showAuthMsg('Wrong username or password', 'error');
    } else {
      enterApp(data.user, username);
    }

    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Log in' : 'Create account';
  }

  function showAuthMsg(text, type) {
    const el = document.getElementById('authMsg');
    el.textContent = text;
    el.className = 'auth-msg ' + type;
  }

  function enterApp(user, username) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('visible');
    document.getElementById('userDisplay').textContent = username;
    document.getElementById('mobileUserDisplay').textContent = username;
    handleResize(); // show mobile nav if on small screen
    loadTopics();
  }

  async function logout() {
    await db.auth.signOut();
    currentUser = null; topics = []; activeTopic = null; activeCards = [];
    document.getElementById('appScreen').classList.remove('visible');
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('mobileNav').style.display = 'none';
    closeMobileSidebar();
    document.getElementById('authUsername').value = '';
    document.getElementById('authPassword').value = '';
    document.getElementById('authConfirm').value  = '';
    showAuthMsg('', '');
  }

  // ── Mobile sidebar ───────────────────────────────
  function openMobileSidebar() {
    document.getElementById('mobileSidebar').classList.add('open');
    document.getElementById('mobileSidebarOverlay').classList.add('open');
  }
  function closeMobileSidebar() {
    document.getElementById('mobileSidebar').classList.remove('open');
    document.getElementById('mobileSidebarOverlay').classList.remove('open');
  }

  // Mobile has its own topic input — wire it up
  function addTopicMobile() {
    const input = document.getElementById('newTopicInputMobile');
    // Temporarily swap the desktop input value, reuse addTopic(), then restore
    const desktop = document.getElementById('newTopicInput');
    desktop.value = input.value;
    input.value = '';
    addTopic();
  }

  document.getElementById('newTopicInputMobile').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTopicMobile();
  });

  // Show/hide mobile nav based on screen size
  function handleResize() {
    const isMobile = window.innerWidth <= 700;
    document.getElementById('mobileNav').style.display =
      isMobile && currentUser ? 'flex' : 'none';
  }
  window.addEventListener('resize', handleResize);

  // ── Drawer (add card panel) ──────────────────────
  function openDrawer() {
    document.getElementById('addCardDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    // Focus the front textarea so user can type right away
    setTimeout(() => document.getElementById('frontInput').focus(), 320);
  }

  function closeDrawer() {
    document.getElementById('addCardDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  // ── Topics ───────────────────────────────────────

  async function loadTopics() {
    document.getElementById('topicList').innerHTML =
      '<div style="padding:16px 12px;font-size:12px;color:var(--muted)">Loading...</div>';
    // Fetch from Supabase — RLS automatically filters to this user's rows only
    const { data, error } = await db.from('topics').select('*').order('created_at');
    if (!error) { topics = data; renderTopics(); renderCards(); }
  }

  async function addTopic() {
    const input = document.getElementById('newTopicInput');
    const name = input.value.trim();
    if (!name) return;
    // Insert a new row into the topics table in Supabase
    const { data, error } = await db.from('topics')
      .insert({ name, user_id: currentUser.id })
      .select().single();
    if (!error) {
      topics.push(data);
      input.value = '';
      renderTopics();
      selectTopic(data.id);
    }
  }

  async function deleteTopic(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this topic and all its cards?')) return;
    // Delete from Supabase — "on delete cascade" in SQL removes all child cards too
    await db.from('topics').delete().eq('id', id);
    topics = topics.filter(t => t.id !== id);
    if (activeTopic === id) { activeTopic = null; activeCards = []; }
    renderTopics(); renderCards();
  }

  function selectTopic(id) {
    activeTopic = id;
    closeMobileSidebar(); // close the drawer after picking a topic on mobile
    renderTopics();
    loadCards(id);
  }

  function renderTopics() {
    const html = topics.length === 0
      ? '<div style="padding:16px 12px;font-size:12px;color:var(--muted);line-height:1.6">No topics yet.<br/>Type a name above and press +</div>'
      : topics.map(t => `
          <div class="topic-item ${t.id === activeTopic ? 'active' : ''}" onclick="selectTopic('${t.id}')">
            <span class="topic-name">${t.name}</span>
            <span class="topic-count" id="count-${t.id}">—</span>
            <button class="topic-delete" onclick="deleteTopic('${t.id}',event)">✕</button>
          </div>`).join('');
    // Sync both desktop and mobile topic lists
    document.getElementById('topicList').innerHTML = html;
    document.getElementById('topicListMobile').innerHTML = html;
  }

  // ── Cards ────────────────────────────────────────

  async function loadCards(topicId) {
    document.getElementById('cardsArea').innerHTML = '<div class="loading">Loading cards...</div>';
    // Fetch cards for this specific topic from Supabase
    const { data, error } = await db.from('cards')
      .select('*').eq('topic_id', topicId).order('created_at');
    if (!error) {
      activeCards = data;
      const el = document.getElementById('count-' + topicId);
      if (el) el.textContent = data.length;
      renderCards();
    }
  }

  async function addCard() {
    const front = document.getElementById('frontInput').value.trim();
    const back  = document.getElementById('backInput').value.trim();
    if (!front || !back) return;
    const btn = document.getElementById('addCardBtn');
    btn.disabled = true;
    // Insert new card into Supabase linked to this topic and user
    const { data, error } = await db.from('cards')
      .insert({ front, back, topic_id: activeTopic, user_id: currentUser.id })
      .select().single();
    if (!error) {
      activeCards.push(data);
      document.getElementById('frontInput').value = '';
      document.getElementById('backInput').value  = '';
      const el = document.getElementById('count-' + activeTopic);
      if (el) el.textContent = activeCards.length;
      closeDrawer(); // slide the drawer back in after saving
      renderCards();
    }
    btn.disabled = false;
  }

  async function deleteCard(cardId, e) {
    e.stopPropagation();
    await db.from('cards').delete().eq('id', cardId);
    activeCards = activeCards.filter(c => c.id !== cardId);
    const el = document.getElementById('count-' + activeTopic);
    if (el) el.textContent = activeCards.length;
    renderCards();
  }

  function flipCard(cardId) {
    document.getElementById('card-' + cardId).classList.toggle('flipped');
  }

  function renderCards() {
    const area     = document.getElementById('cardsArea');
    const title    = document.getElementById('topicTitle');
    const subtitle = document.getElementById('topicSubtitle');
    const btn      = document.getElementById('studyBtn');

    if (!activeTopic) {
      title.textContent = 'Select a topic';
      subtitle.textContent = 'Pick a topic from the sidebar';
      btn.disabled = true;
      // Sync mobile
      document.getElementById('mobileTopicLabel').textContent = 'No topic selected';
      const mbtn = document.getElementById('studyBtnMobile');
      if (mbtn) mbtn.disabled = true;
      area.innerHTML = `<div class="no-topic"><div class="no-topic-icon">📂</div><p>Tap the menu icon above to pick a topic</p></div>`;
      return;
    }

    const topic = topics.find(t => t.id === activeTopic);
    title.textContent    = topic.name;
    subtitle.textContent = `${activeCards.length} card${activeCards.length !== 1 ? 's' : ''}`;
    btn.disabled = activeCards.length === 0;
    // Sync mobile top bar
    document.getElementById('mobileTopicLabel').textContent = topic.name;
    const mbtn = document.getElementById('studyBtnMobile');
    if (mbtn) mbtn.disabled = activeCards.length === 0;

    area.innerHTML = `
      <button class="btn-open-drawer" onclick="openDrawer()">
        <span>＋</span> Add a card
      </button>
      ${activeCards.length === 0
        ? `<div class="empty-state"><div class="empty-icon">🃏</div><h3>No cards yet</h3><p>Use the form above to add your first card to <strong>${topic.name}</strong></p></div>`
        : `<div class="cards-grid">${activeCards.map(c => `
            <div class="card-wrap" id="card-${c.id}" onclick="flipCard('${c.id}')">
              <div class="card-inner">
                <div class="card-face">
                  <div class="card-label">Question</div>
                  <div class="card-text">${c.front}</div>
                  <div class="card-hint">Click to flip</div>
                </div>
                <div class="card-face card-back">
                  <div class="card-label">Answer</div>
                  <div class="card-text">${c.back}</div>
                  <div class="card-footer">
                    <button class="btn-delete-card" onclick="deleteCard('${c.id}',event)">Delete</button>
                  </div>
                </div>
              </div>
            </div>`).join('')}
          </div>`
      }`;
  }

  // ── Study mode ───────────────────────────────────

  function openStudy() {
    if (!activeTopic || activeCards.length === 0) return;
    studyIndex = 0; renderStudyCard();
    document.getElementById('studyOverlay').classList.add('open');
  }
  function closeStudy() { document.getElementById('studyOverlay').classList.remove('open'); }

  function renderStudyCard() {
    const card = activeCards[studyIndex];
    document.getElementById('studyProgress').textContent = `Card ${studyIndex + 1} of ${activeCards.length}`;
    document.getElementById('studyFrontText').textContent = card.front;
    document.getElementById('studyBackText').textContent  = card.back;
    document.getElementById('studyCardWrap').classList.remove('flipped');
    document.getElementById('prevBtn').disabled = studyIndex === 0;
    document.getElementById('nextBtn').disabled = studyIndex === activeCards.length - 1;
  }

  function flipStudyCard() { document.getElementById('studyCardWrap').classList.toggle('flipped'); }
  function prevCard() { if (studyIndex > 0) { studyIndex--; renderStudyCard(); } }
  function nextCard() { if (studyIndex < activeCards.length - 1) { studyIndex++; renderStudyCard(); } }

  // Keyboard shortcuts in study mode
  document.addEventListener('keydown', e => {
    // Close drawer with Escape if it's open
    if (e.key === 'Escape' && document.getElementById('addCardDrawer').classList.contains('open')) {
      closeDrawer(); return;
    }
    if (!document.getElementById('studyOverlay').classList.contains('open')) return;
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === 'ArrowLeft')  prevCard();
    if (e.key === ' ') { e.preventDefault(); flipStudyCard(); }
    if (e.key === 'Escape') closeStudy();
  });

  document.getElementById('newTopicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTopic();
  });

  ['authUsername','authPassword','authConfirm'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAuth();
    });
  });

  // On page load — check if user already has an active session
  // If yes, skip the login screen entirely
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      const username = session.user.email.split('@')[0];
      enterApp(session.user, username);
    }
  });
</script>
</body>
</html>
